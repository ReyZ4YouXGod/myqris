<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReyCloudDev Payment</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #00f2ff;
    --bg: #0a0a0c;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,242,255,0.1);
    animation: fadeIn 0.8s ease;
}

h1 {
    margin: 0;
    color: var(--primary);
    font-size: 20px;
    letter-spacing: 2px;
}

p {
    font-size: 12px;
    color: #777;
    margin-bottom: 20px;
}

/* Input */
input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(0,242,255,0.3);
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 10px rgba(0,242,255,0.3);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #00f2ff, #00ffa6);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0,255,200,0.4);
}

/* QR */
.qr-box {
    margin-top: 20px;
    padding: 15px;
    background: white;
    border-radius: 15px;
    display: inline-block;
}

#qr {
    width: 200px;
}

/* Status */
.status {
    margin-top: 15px;
    padding: 8px;
    border-radius: 20px;
    border: 1px solid var(--primary);
    color: var(--primary);
    font-size: 12px;
}

/* Loader */
.loader {
    border: 3px solid #222;
    border-top: 3px solid var(--primary);
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
    margin: 15px auto;
    display: none;
}

.hidden {
    display: none;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}

.footer {
    margin-top: 20px;
    font-size: 10px;
    color: #444;
}
</style>
</head>

<body>

<div class="container">

    <h1>REYCLOUDDEV</h1>
    <p>QRIS AUTO PAYMENT</p>

    <!-- FORM -->
    <div id="form">
        <input type="number" id="amount" placeholder="Masukkan nominal (min 1000)">
        <button onclick="generateQRIS()">GENERATE QR</button>
        <div class="loader" id="loader"></div>
    </div>

    <!-- RESULT -->
    <div id="result" class="hidden">
        <div class="qr-box">
            <img id="qr">
        </div>

        <div style="margin-top:10px;font-size:12px;">
            ID: <span id="order" style="color:#00f2ff;"></span>
        </div>

        <div class="status" id="status">MENUNGGU PEMBAYARAN...</div>

        <button onclick="location.reload()" style="background:#222;color:#aaa;margin-top:15px;">
            BATAL / ULANG
        </button>
    </div>

    <div class="footer">© 2026 ReyCloudDev</div>

</div>

<script src="api.js"></script>

</body>
</html>
